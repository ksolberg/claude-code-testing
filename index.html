<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --x: #ff3060;
      --o: #00e0ff;
      --text: #9898c8;
      --muted: #3c3c70;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(rgba(70, 50, 180, 0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      overflow: hidden;
    }

    /* Central ambient glow */
    body::before {
      content: '';
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(55, 35, 180, 0.2) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        transparent, transparent 3px,
        rgba(0, 0, 0, 0.07) 3px, rgba(0, 0, 0, 0.07) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0 7px rgba(255,255,255,0.9),
        0 0 20px rgba(130,110,255,0.8),
        0 0 40px rgba(100,80,255,0.6),
        0 0 70px rgba(80,60,220,0.4);
    }

    #status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      min-height: 1.2em;
      color: var(--x);
      text-shadow: 0 0 10px var(--x);
      transition: opacity 0.15s ease;
    }

    /* Board */
    .board-wrap {
      position: relative;
      width: 330px;
      height: 330px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
    }

    .board-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }

    .cell:not(.taken):hover::after {
      content: '';
      position: absolute;
      inset: 10px;
      background: rgba(80, 60, 180, 0.08);
      border-radius: 3px;
    }

    .mark {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 3rem;
      display: inline-block;
      animation: popIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .cell.x .mark {
      color: var(--x);
      text-shadow: 0 0 8px var(--x), 0 0 18px var(--x), 0 0 35px var(--x);
    }

    .cell.o .mark {
      color: var(--o);
      text-shadow: 0 0 8px var(--o), 0 0 18px var(--o), 0 0 35px var(--o);
    }

    .cell.win .mark {
      color: #ffc840;
      animation: winPulse 0.65s ease-in-out infinite alternate;
    }

    @keyframes popIn {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes winPulse {
      from {
        text-shadow: 0 0 8px #ffc840, 0 0 20px #ffc840, 0 0 40px #ffc840;
        transform: scale(1);
      }
      to {
        text-shadow: 0 0 12px #fff, 0 0 30px #ffc840, 0 0 60px #ffc840, 0 0 90px rgba(255,200,64,0.5);
        transform: scale(1.08);
      }
    }

    /* Scores */
    #scores {
      display: flex;
      align-items: stretch;
    }

    .score-item {
      padding: 0 2.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .score-item:not(:last-child) {
      border-right: 1px solid var(--muted);
    }

    .score-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .score-value {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
    }

    #score-x .score-value { color: var(--x); text-shadow: 0 0 12px var(--x); }
    #score-o .score-value { color: var(--o); text-shadow: 0 0 12px var(--o); }
    #score-d .score-value { color: var(--muted); }

    @keyframes scoreBump {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.5); }
    }
    .score-value.bump { animation: scoreBump 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Button */
    #restart {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.68rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      padding: 0.75rem 2.2rem;
      background: transparent;
      color: rgba(150, 130, 255, 0.7);
      border: 1px solid rgba(100, 80, 200, 0.35);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, text-shadow 0.2s;
    }

    #restart:hover {
      color: #fff;
      border-color: rgba(160, 140, 255, 0.8);
      box-shadow: 0 0 20px rgba(100, 80, 200, 0.4), inset 0 0 20px rgba(100, 80, 200, 0.08);
      text-shadow: 0 0 10px rgba(200, 180, 255, 0.9);
    }

    #restart:active { transform: scale(0.97); }

    .board-lines .grid-line {
      filter: drop-shadow(0 0 5px #a080ff);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div id="status">X sin tur</div>

    <div class="board-wrap">
      <div id="board">
        <div class="cell" data-i="0"></div>
        <div class="cell" data-i="1"></div>
        <div class="cell" data-i="2"></div>
        <div class="cell" data-i="3"></div>
        <div class="cell" data-i="4"></div>
        <div class="cell" data-i="5"></div>
        <div class="cell" data-i="6"></div>
        <div class="cell" data-i="7"></div>
        <div class="cell" data-i="8"></div>
      </div>

      <svg class="board-lines" viewBox="0 0 330 330" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="strong-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="blur"/>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <!-- Grid lines -->
        <line class="grid-line" x1="110" y1="12" x2="110" y2="318" stroke="#a080ff" stroke-width="2" stroke-linecap="round"/>
        <line class="grid-line" x1="220" y1="12" x2="220" y2="318" stroke="#a080ff" stroke-width="2" stroke-linecap="round"/>
        <line class="grid-line" x1="12" y1="110" x2="318" y2="110" stroke="#a080ff" stroke-width="2" stroke-linecap="round"/>
        <line class="grid-line" x1="12" y1="220" x2="318" y2="220" stroke="#a080ff" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div id="scores">
      <div class="score-item" id="score-x">
        <div class="score-label">X vinner</div>
        <div class="score-value" id="val-x">0</div>
      </div>
      <div class="score-item" id="score-d">
        <div class="score-label">Uavgjort</div>
        <div class="score-value" id="val-d">0</div>
      </div>
      <div class="score-item" id="score-o">
        <div class="score-label">O vinner</div>
        <div class="score-value" id="val-o">0</div>
      </div>
    </div>

    <button id="restart">Spill på nytt</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    const scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const svg = document.querySelector('.board-lines');
    const valX = document.getElementById('val-x');
    const valO = document.getElementById('val-o');
    const valD = document.getElementById('val-d');

    function playerColor(p) {
      return p === 'X' ? 'var(--x)' : 'var(--o)';
    }

    function cellCenter(i) {
      return { x: (i % 3) * 110 + 55, y: Math.floor(i / 3) * 110 + 55 };
    }

    function drawWinLine(combo) {
      const s = cellCenter(combo[0]);
      const e = cellCenter(combo[2]);
      const dist = Math.hypot(e.x - s.x, e.y - s.y);
      const nx = (e.x - s.x) / dist;
      const ny = (e.y - s.y) / dist;
      const pad = 22;
      const len = dist + pad * 2 + 10;
      const stroke = current === 'X' ? 'rgba(255,48,96,0.9)' : 'rgba(0,224,255,0.9)';

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', s.x - nx * pad);
      line.setAttribute('y1', s.y - ny * pad);
      line.setAttribute('x2', e.x + nx * pad);
      line.setAttribute('y2', e.y + ny * pad);
      line.setAttribute('stroke', stroke);
      line.setAttribute('stroke-width', '3');
      line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('filter', 'url(#strong-glow)');
      line.id = 'win-line';
      line.style.strokeDasharray = len;
      line.style.strokeDashoffset = len;
      svg.appendChild(line);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        line.style.transition = 'stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
        line.style.strokeDashoffset = '0';
      }));
    }

    function clearWinLine() {
      document.getElementById('win-line')?.remove();
    }

    function render() {
      cells.forEach((cell, i) => {
        const val = board[i];
        const existing = cell.querySelector('.mark');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        if (val && !existing) {
          const span = document.createElement('span');
          span.className = 'mark';
          span.textContent = val;
          cell.appendChild(span);
        } else if (!val && existing) {
          existing.remove();
        }
      });
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return [a, b, c];
      }
      return null;
    }

    function bumpScore(el) {
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
    }

    function updateScores() {
      valX.textContent = scores.X;
      valO.textContent = scores.O;
      valD.textContent = scores.D;
    }

    function setStatus(text, color, shadow) {
      statusEl.style.opacity = '0';
      setTimeout(() => {
        statusEl.textContent = text;
        statusEl.style.color = color;
        statusEl.style.textShadow = shadow || `0 0 10px ${color}`;
        statusEl.style.opacity = '1';
      }, 130);
    }

    function handleClick(e) {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver) return;
      const i = parseInt(cell.dataset.i);
      if (board[i]) return;

      board[i] = current;
      render();

      const winCombo = checkWin();
      if (winCombo) {
        gameOver = true;
        winCombo.forEach(idx => cells[idx].classList.add('win'));
        drawWinLine(winCombo);
        const c = playerColor(current);
        setStatus(`${current} vinner! ★`, c, `0 0 20px ${c}`);
        scores[current]++;
        updateScores();
        bumpScore(current === 'X' ? valX : valO);
      } else if (board.every(Boolean)) {
        gameOver = true;
        setStatus('Uavgjort', 'var(--muted)', 'none');
        scores.D++;
        updateScores();
        bumpScore(valD);
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`${current} sin tur`, playerColor(current));
      }
    }

    function restart() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      clearWinLine();
      setStatus('X sin tur', 'var(--x)');
      render();
    }

    document.getElementById('board').addEventListener('click', handleClick);
    document.getElementById('restart').addEventListener('click', restart);
  </script>
</body>
</html>
